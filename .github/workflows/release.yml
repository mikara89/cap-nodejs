name: Release

on:
  workflow_dispatch:
    inputs:
      operation:
        description: 'Release operation'
        required: true
        default: release
        type: choice
        options:
          - release
          - graduate
          - bootstrap
      channel:
        description: 'npm release channel'
        required: true
        default: stable
        type: choice
        options:
          - stable
          - beta
          - rc
      coordinated_major:
        description: 'Force an explicit major/premajor across every package'
        required: true
        default: false
        type: boolean
      confirmation:
        description: 'Required for bootstrap or coordinated major'
        required: false
        default: ''
        type: string

permissions:
  contents: read

concurrency:
  group: npm-release-${{ github.repository }}
  cancel-in-progress: false

env:
  NPM_REGISTRY_URL: https://registry.npmjs.org/

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      head_sha: ${{ steps.head.outputs.sha }}
    steps:
      - name: Checkout complete history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Record validated HEAD
        id: head
        run: echo "sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm

      - name: Install npm with trusted publishing support
        run: npm install --global npm@11.5.1

      - name: Install dependencies
        run: npm ci --package-lock=true

      - name: Verify Lerna release configuration
        run: npm run release:verify

      - name: Test release tooling
        run: npm run test:release-tooling

      - name: Calculate and print the Lerna release plan
        run: >
          node tools/release-tool.js plan
          --operation "${{ inputs.operation }}"
          --channel "${{ inputs.channel }}"
          --coordinated-major "${{ inputs.coordinated_major }}"
          --confirmation "${{ inputs.confirmation }}"
          --output release-plan.generated.json

      - name: Preserve approved release plan
        uses: actions/upload-artifact@v4
        with:
          name: lerna-release-plan
          path: release-plan.generated.json
          if-no-files-found: error
          retention-days: 1

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Lint
        run: npm run lint:check

      - name: Build
        run: npm run build

      - name: Check examples
        run: npm run examples:check

      - name: Generate API docs
        run: npm run docs:api

      - name: Run tests
        run: npm test -- --runInBand

      - name: Run database integration gate
        run: npm run test:integration:db

      - name: Verify package archives
        run: npm run pack:dry-run

  publish:
    needs: validate
    runs-on: ubuntu-latest
    environment: npm-production
    permissions:
      contents: write
      id-token: write
      workflows: write
    steps:
      - name: Checkout main with complete history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm

      - name: Install npm with trusted publishing support
        run: npm install --global npm@11.5.1

      - name: Install dependencies
        run: npm ci --package-lock=true

      - name: Download approved release plan
        uses: actions/download-artifact@v4
        with:
          name: lerna-release-plan

      - name: Configure release commit identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Configure temporary npm token when present
        if: ${{ inputs.operation == 'bootstrap' }}
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ -n "${NODE_AUTH_TOKEN:-}" ]]; then
            umask 077
            printf '%s\n' '//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}' > "${RUNNER_TEMP}/npmrc"
            echo "NPM_CONFIG_USERCONFIG=${RUNNER_TEMP}/npmrc" >> "${GITHUB_ENV}"
            echo 'Temporary npm token authentication configured for bootstrap.'
          else
            echo 'No bootstrap token configured; npm OIDC trusted publishing must already be enabled.'
          fi

      - name: Use npm OIDC for non-bootstrap releases
        if: ${{ inputs.operation != 'bootstrap' }}
        run: echo 'Using npm trusted publishing; temporary npm tokens are bootstrap-only.'

      - name: Execute approved Lerna plan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXPECTED_HEAD_SHA: ${{ needs.validate.outputs.head_sha }}
        run: node tools/release-tool.js execute --plan release-plan.generated.json
