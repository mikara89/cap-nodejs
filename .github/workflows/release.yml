name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel'
        required: true
        default: beta
        type: choice
        options:
          - stable
          - beta
          - rc
      graduate:
        description: 'Graduate existing prereleases to stable'
        required: true
        default: false
        type: boolean
      publish_existing_versions:
        description: 'Publish package.json versions without versioning'
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NPM_REGISTRY_URL: https://npm.pkg.github.com
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@mikara89'
          cache: 'npm'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install
        run: npm ci

      - name: Build libs
        run: npm run build:libs

      - name: Verify package contents
        run: npm run pack:dry-run

      - name: Publish packages (Lerna)
        shell: bash
        env:
          RELEASE_CHANNEL: ${{ github.event_name == 'push' && 'stable' || inputs.channel }}
          RELEASE_GRADUATE: ${{ github.event_name == 'workflow_dispatch' && inputs.graduate || false }}
          RELEASE_PUBLISH_EXISTING: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_existing_versions || false }}
        run: |
          if [ "${RELEASE_PUBLISH_EXISTING}" = "true" ]; then
            if [ "${RELEASE_GRADUATE}" = "true" ]; then
              echo "publish_existing_versions cannot be combined with graduate." >&2
              exit 1
            fi

            if [ "${RELEASE_CHANNEL}" = "stable" ]; then
              DIST_TAG="latest"
            elif [ "${RELEASE_CHANNEL}" = "beta" ]; then
              DIST_TAG="beta"
            elif [ "${RELEASE_CHANNEL}" = "rc" ]; then
              DIST_TAG="rc"
            else
              echo "Unsupported release channel: ${RELEASE_CHANNEL}" >&2
              exit 1
            fi

            npx lerna publish from-package --yes --registry "${NPM_REGISTRY_URL}" --dist-tag "${DIST_TAG}"
            exit 0
          fi

          LERNA_ARGS=(
            "--conventional-commits"
            "--create-release"
            "github"
            "--yes"
            "--registry"
            "${NPM_REGISTRY_URL}"
          )

          if [ "${RELEASE_GRADUATE}" = "true" ]; then
            LERNA_ARGS+=("--conventional-graduate" "--dist-tag" "latest")
          elif [ "${RELEASE_CHANNEL}" = "stable" ]; then
            LERNA_ARGS+=("--dist-tag" "latest")
          elif [ "${RELEASE_CHANNEL}" = "beta" ]; then
            LERNA_ARGS+=("--conventional-prerelease" "--preid" "beta" "--dist-tag" "beta")
          elif [ "${RELEASE_CHANNEL}" = "rc" ]; then
            LERNA_ARGS+=("--conventional-prerelease" "--preid" "rc" "--dist-tag" "rc")
          else
            echo "Unsupported release channel: ${RELEASE_CHANNEL}" >&2
            exit 1
          fi

          npx lerna publish "${LERNA_ARGS[@]}"
