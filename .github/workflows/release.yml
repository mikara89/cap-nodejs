name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NPM_REGISTRY_URL: ${{ secrets.NPM_REGISTRY_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: ${{ secrets.NPM_REGISTRY_URL }}
          cache: 'npm'

      - name: Authenticate to registry
        run: |
          echo "//$(echo ${{ secrets.NPM_REGISTRY_URL }} | sed -E 's|https?://||')/:_authToken=${{ secrets.NPM_TOKEN }}" >> ~/.npmrc

      - name: Install
        run: npm ci --ignore-scripts

      - name: Build libs
        run: npm run build:libs:lerna

      - name: Verify package contents
        run: npm run pack:dry-run

      - name: Publish packages (Lerna)
        run: npx lerna publish --conventional-commits --yes --registry ${{ secrets.NPM_REGISTRY_URL }}
