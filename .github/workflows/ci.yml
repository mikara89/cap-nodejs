name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install
        run: npm ci --ignore-scripts
      - name: Lint
        run: npm run lint:check
      - name: Build
        run: npm run build
      - name: Type-check `libs/cap-nest`
        run: npx tsc -p libs/cap-nest/tsconfig.lib.json --noEmit
      - name: Run tests
        run: npm test --silent
      - name: Run e2e tests
        run: npm run test:e2e -- --runInBand
      - name: Verify package contents
        run: npm run pack:dry-run
