name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_rabbitmq_integration:
        description: 'Run RabbitMQ integration gate (requires Docker)'
        required: false
        default: false
        type: boolean
      run_kafka_integration:
        description: 'Run Kafka integration gate (requires Docker)'
        required: false
        default: false
        type: boolean
      run_aws_sns_sqs_integration:
        description: 'Run AWS SNS/SQS integration gate (requires Docker)'
        required: false
        default: false
        type: boolean
      run_servicebus_integration:
        description: 'Run Azure Service Bus integration gate (requires Azure)'
        required: false
        default: false
        type: boolean

jobs:
  # ------- fast affected checks -------
  affected-checks:
    runs-on: ubuntu-latest
    outputs:
      affected_packages: ${{ steps.affected.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install
        run: npm ci --package-lock=true
      - name: List affected packages
        id: affected
        run: |
          AFFECTED=$(npx lerna ls --since=origin/main --all 2>/dev/null | grep '^@mikara89/' | tr '\n' ' ')
          echo "packages=${AFFECTED}" >> "$GITHUB_OUTPUT"
          echo "Affected packages: ${AFFECTED}"
      - name: Lint affected
        run: npm run lint:affected
      - name: Build affected
        run: npm run build:affected
      # Note: test:affected is intentionally excluded from fast checks.
      # Running jest from sub-package directories via lerna run test
      # bypasses ts-jest transforms on Linux. The full build-and-test
      # job runs npm test --silent from root which works correctly.

  # ------- targeted integration: RabbitMQ -------
  rabbitmq-integration:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_rabbitmq_integration }}
    needs: affected-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install
        run: npm ci --package-lock=true
      - name: Build
        run: npm run build
      - name: Run RabbitMQ integration gate
        run: npm run test:integration:rabbitmq

  # ------- targeted integration: Kafka -------
  kafka-integration:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_kafka_integration }}
    needs: affected-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install
        run: npm ci --package-lock=true
      - name: Build
        run: npm run build
      - name: Run Kafka integration gate
        run: npm run test:integration:kafka

  # ------- targeted integration: AWS SNS/SQS -------
  aws-sns-sqs-integration:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_aws_sns_sqs_integration }}
    needs: affected-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install
        run: npm ci --package-lock=true
      - name: Build
        run: npm run build
      - name: Run AWS SNS/SQS integration gate
        run: npm run test:integration:aws-sns-sqs

  # ------- full validation (PR and push gate) -------
  build-and-test:
    needs: affected-checks
    if: ${{ !cancelled() && !failure() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install
        run: npm ci --package-lock=true
      - name: Lint
        run: npm run lint:check
      - name: Verify Lerna release configuration
        run: npm run release:verify
      - name: Verify deprecated package names are absent
        run: npm run verify:legacy-package-names
      - name: Test release tooling
        run: npm run test:release-tooling
      - name: Fallow audit
        run: npm run fallow:ci
        continue-on-error: true
      - name: Fallow health gate
        run: npm run fallow:health:ci
      - name: Build
        run: npm run build
      - name: Type-check examples
        run: npm run examples:check
      - name: Generate API docs
        run: npm run docs:api
      - name: Verify workspace links
        run: npm ls --workspaces --depth=0
      - name: Type-check `libs/cap-nest`
        run: npx tsc -p libs/cap-nest/tsconfig.lib.json --noEmit
      - name: Run tests
        run: npm test --silent
      - name: Run e2e tests
        run: npm run test:e2e -- --runInBand
      - name: Run DB integration gate
        run: npm run test:integration:db
      - name: Verify package contents
        run: npm run pack:dry-run
      - name: Verify RabbitMQ package install
        run: npm run pack:smoke:rabbitmq
      - name: Verify Kafka package install
        run: npm run pack:smoke:kafka
      - name: Verify AWS SNS/SQS package install
        run: npm run pack:smoke:aws-sns-sqs

  servicebus-integration:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_servicebus_integration }}
    runs-on: ubuntu-latest
    env:
      SERVICEBUS_CONNECTION_STRING: ${{ secrets.SERVICEBUS_CONNECTION_STRING }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install
        run: npm ci --package-lock=true
      - name: Run Azure Service Bus integration gate
        run: npm run test:integration:servicebus
