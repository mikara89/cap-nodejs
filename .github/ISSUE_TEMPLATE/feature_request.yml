name: Feature request
description: Suggest an improvement or new capability.
title: 'feat: '
labels: ['enhancement', 'needs-triage']
body:
  - type: dropdown
    id: package
    attributes:
      label: Area
      options:
        - '@mikara89/cap-core'
        - '@mikara89/cap-nest'
        - '@mikara89/cap-express'
        - '@mikara89/cap-storage-mikro-orm'
        - '@mikara89/cap-transport-azure-servicebus'
        - '@mikara89/cap-transport-nestjs-microservices'
        - '@mikara89/cap-dashboard-core'
        - '@mikara89/cap-dashboard-nest'
        - '@mikara89/cap-dashboard-express'
        - '@mikara89/cap-dashboard'
        - '@mikara89/cap-testing'
        - Documentation
        - Tooling
        - Not sure
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do, and what is hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API, behavior, or documentation change you would like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Include workarounds or related packages if relevant.
